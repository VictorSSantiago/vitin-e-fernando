<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoCity - Painel Sustentável</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🌱 EcoCity: VerdeVida</h1>
            <p>Monitoramento de Recursos e Impacto Ambiental em Tempo Real</p>
        </header>

        <main class="dashboard">
            <div class="card solar">
                <div class="icon">☀️</div>
                <h3>Energia Solar</h3>
                <p><span id="solar">0</span> kWh</p>
            </div>

            <div class="card eolica">
                <div class="icon">💨</div>
                <h3>Energia Eólica</h3>
                <p><span id="eolica">0</span> kWh</p>
            </div>

            <div class="card agua">
                <div class="icon">💧</div>
                <h3>Água Poupada</h3>
                <p><span id="agua">0</span> Litros</p>
            </div>

            <div class="card co2">
                <div class="icon">🌿</div>
                <h3>CO₂ Evitado</h3>
                <p><span id="co2">0.00</span> kg</p>
            </div>
        </main>

        <section class="controls">
            <button id="btn-simular">Simular Próximo Dia</button>
            <p class="status">Dia atual no simulador: <span id="dia">0</span></p>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
